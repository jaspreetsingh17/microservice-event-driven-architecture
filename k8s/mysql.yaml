apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pv-claim
  namespace: news-mysql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: news-mysql
spec:
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
    spec:
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: mysql-pv-claim
      - name: mysql-initdb
        configMap:
          name: mysql-init-config
      - name: secret-volume
        emptyDir: {}
      initContainers:
      - name: vault-init
        image: hashicorp/vault:1.15
        command: ["/bin/sh", "-c"]
        args:
        - |
          # Authenticate with Vault
          export KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=newsflow-role jwt=$KUBE_TOKEN)
          # Fetch secrets into files
          vault kv get -field=root_password secret/newsflow/mysql > /vault/secrets/root-password
          vault kv get -field=user_password secret/newsflow/mysql > /vault/secrets/user-password
          chmod 600 /vault/secrets/*
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        volumeMounts:
        - name: secret-volume
          mountPath: /vault/secrets
      containers:
      - image: mysql:8.0
        name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD_FILE
          value: /vault/secrets/root-password
        - name: MYSQL_PASSWORD_FILE
          value: /vault/secrets/user-password
        - name: MYSQL_DATABASE
          value: newsdb
        - name: MYSQL_USER
          value: newsuser
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
        - name: mysql-initdb
          mountPath: /docker-entrypoint-initdb.d
        - name: secret-volume
          mountPath: /vault/secrets
          readOnly: true
        livenessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: news-mysql
spec:
  ports:
  - port: 3306
  selector:
    app: mysql
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-config
  namespace: news-mysql
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS newsdb;
    USE newsdb;
    CREATE TABLE IF NOT EXISTS articles (
        id          BIGINT AUTO_INCREMENT PRIMARY KEY,
        title       VARCHAR(512)  NOT NULL,
        description TEXT,
        content     TEXT,
        source      VARCHAR(128)  NOT NULL,
        url         VARCHAR(1024) NOT NULL,
        image_url   VARCHAR(1024) DEFAULT '',
        category    VARCHAR(64)   DEFAULT 'general',
        published_at DATETIME     DEFAULT CURRENT_TIMESTAMP,
        created_at  DATETIME      DEFAULT CURRENT_TIMESTAMP,
        UNIQUE KEY  idx_url (url(512))
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

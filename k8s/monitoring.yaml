apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.0.0
        ports:
          - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: "Admin"
        volumeMounts:
        - name: provisioning-volume
          mountPath: /etc/grafana/provisioning/datasources/datasource.yml
          subPath: datasource.yml
        - name: provisioning-volume
          mountPath: /etc/grafana/provisioning/dashboards/dashboard-provider.yml
          subPath: dashboard-provider.yml
        - name: dashboard-volume
          mountPath: /var/lib/grafana/dashboards/newsflow-overview.json
          subPath: newsflow-overview.json
        - name: pod-res-volume
          mountPath: /var/lib/grafana/dashboards/pod-resources.json
          subPath: pod-resources.json
      volumes:
      - name: provisioning-volume
        configMap:
          name: grafana-provisioning
      - name: dashboard-volume
        configMap:
          name: grafana-dashboard-newsflow
      - name: pod-res-volume
        configMap:
          name: grafana-dashboard-pod-resources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: grafana
